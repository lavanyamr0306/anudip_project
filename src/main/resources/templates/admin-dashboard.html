<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Resume Analyzer</title>
    <style>
        :root {
            --bg-body: #f1f5f9;
            --surface: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --primary: #4f46e5;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        body {
            margin: 0;
            font-family: "Inter", "Segoe UI", sans-serif;
            background-color: var(--bg-body);
            color: var(--text-primary);
        }

        header {
            background-color: var(--surface);
            box-shadow: var(--shadow-sm);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--primary);
        }

        .auth-actions a {
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            transition: background 0.2s;
        }

        .auth-actions a:hover {
            background-color: var(--bg-body);
        }

        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 0.75rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }

        .stat-card h3 {
            margin: 0 0 0.5rem 0;
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-card p {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .table-container {
            background: var(--surface);
            border-radius: 0.75rem;
            box-shadow: var(--shadow-md);
            overflow: hidden;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .table-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .table-header h2 {
            margin: 0;
            font-size: 1.25rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: #f8fafc;
            padding: 0.75rem 1.5rem;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .role-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .role-ADMIN {
            background-color: #ede9fe;
            color: #5b21b6;
        }

        .role-USER {
            background-color: #dbeafe;
            color: #1e40af;
        }

        .btn-delete {
            background-color: var(--danger);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-delete:hover {
            background-color: var(--danger-hover);
        }

        .btn-delete:disabled {
            background-color: #fca5a5;
            cursor: not-allowed;
        }

        .btn-suspend {
            background-color: #f59e0b;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-suspend:hover { background-color: #d97706; }
        .btn-suspend:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-activate {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-activate:hover { background-color: #059669; }
        .btn-activate:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-view {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
        }

        .btn-view:hover { background-color: #1d4ed8; }

    </style>
</head>
<body>

<header>
    <h1>Admin Panel</h1>
    <div class="auth-actions">
        <span style="margin-right: 1rem; color: var(--text-secondary);" th:text="'Logged in as ' + ${adminName}"></span>
        <a th:href="@{/admin/logout}">Logout</a>
    </div>
</header>

<main>
    <div class="stats-grid">
        <div class="stat-card">
            <h3>Total Users</h3>
            <p th:text="${users.size()}"></p>
        </div>
        <div class="stat-card">
            <h3>Total Analyses Performed</h3>
            <p th:text="${analyses.size()}"></p>
        </div>
    </div>

    <div class="table-container">
        <div class="table-header">
            <h2>User Management</h2>
        </div>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Password</th>
                    <th>Role</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.id}"></td>
                    <td th:text="${u.name}"></td>
                    <td th:text="${u.email}"></td>
                    <td th:text="${u.password}"></td>
                    <td>
                        <span th:with="displayRole=${u.role == null or u.role.trim().isEmpty() ? 'USER' : u.role}"
                              th:class="'role-badge role-' + ${displayRole}"
                              th:text="${displayRole}"></span>
                    </td>
                    <td>
                        <div style="display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap;">
                            <a th:href="@{/admin/user/{id}(id=${u.id})}" class="btn-view">View Details</a>
                            <form th:action="@{/admin/user/{id}/toggle-lock(id=${u.id})}" method="post" style="margin: 0;">
                                <button type="submit"
                                        th:class="${u.locked ? 'btn-activate' : 'btn-suspend'}"
                                        th:text="${u.locked ? 'Activate' : 'Suspend'}"
                                        th:disabled="${admin != null and u.id == admin.id}">
                                </button>
                            </form>
                            <form th:action="@{/admin/user/{id}/delete(id=${u.id})}" method="post" onsubmit="return confirm('Are you sure you want to completely delete this user and all their resumes?');" style="margin: 0;">
                                <button type="submit" class="btn-delete" th:disabled="${admin != null and u.id == admin.id}">Delete</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${users.isEmpty()}">
                    <td colspan="5" style="text-align: center; color: var(--text-secondary);">No users found.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="table-container">
        <div class="table-header">
            <h2>Platform Analyses</h2>
        </div>
        <div style="max-height: 400px; overflow-y: auto;">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>User</th>
                        <th>File/Resume</th>
                        <th>Status</th>
                        <th>Score</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="a : ${analyses}">
                        <td th:text="${a.id}"></td>
                        <td th:text="${a.user.email}"></td>
                        <td th:text="${a.fileName}"></td>
                        <td th:text="${a.status}"></td>
                        <td style="font-weight: 600; color: #047857;" th:text="${a.finalScore} + '%'"></td>
                    </tr>
                    <tr th:if="${analyses.isEmpty()}">
                        <td colspan="5" style="text-align: center; color: var(--text-secondary);">No analyses found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>

</body>
</html>
